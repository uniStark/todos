services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    volumes:
      - todos-data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      # 设置访问密码；生产环境请显式配置，留空会禁用受保护写操作
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      # AI 大模型配置 (SiliconFlow API，可选；留空时 AI 功能不可用)
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.siliconflow.cn/v1}
      - AI_MODEL_GLM4=${AI_MODEL_GLM4:-zai-org/GLM-4.6}
      - AI_MODEL_DEEPSEEK=${AI_MODEL_DEEPSEEK:-deepseek-ai/DeepSeek-V3.1-Terminus}
      - AI_DEFAULT_MODEL=${AI_DEFAULT_MODEL:-deepseek_v3.1}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-2000}
      - AI_TIMEOUT=${AI_TIMEOUT:-600}
    restart: always

volumes:
  todos-data:
