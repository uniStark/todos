services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: stark-todo-list:latest
    ports:
      - "3002:3000"
    volumes:
      - todos-data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      # 注册控制：
      #  - ALLOW_REGISTRATION=true 才开放公开注册（数据库为空时首个用户始终放行作引导）
      #  - 设置 INVITE_CODE 后改为“凭邀请码注册”（开放注册但需提供正确邀请码）
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - INVITE_CODE=${INVITE_CODE:-}
      # AI（任意 OpenAI 兼容网关，可选；AI_API_KEY 留空则 AI 功能不可用，模型列表动态从 /v1/models 拉取）
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_DEFAULT_MODEL=${AI_DEFAULT_MODEL:-gpt-4o-mini}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-2000}
      - AI_TIMEOUT=${AI_TIMEOUT:-60}
    restart: always

  # 维护 sidecar：独立容器跑定时维护（清过期 session + 软删回收 + SQLite 备份），
  # 不绑 web 进程生命周期（避免在 Next 进程内用 setInterval）。复用 app 镜像（含 node + better-sqlite3 + /app/scripts）。
  maintenance:
    image: stark-todo-list:latest
    depends_on:
      - app
    volumes:
      - todos-data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
    restart: unless-stopped
    command: ["sh", "/app/scripts/maintenance-cron.sh"]
    # 维护容器只跑 cron、不起 web 服务，禁用从镜像继承的 web healthcheck，
    # 否则 `fetch /api/health` 必然失败、容器被标记 unhealthy（误报）。
    healthcheck:
      disable: true

volumes:
  todos-data:
